<div class="section-header">
    <span class="material-icons">notifications_active</span>
    <h3>Notification Settings</h3>
</div>

<div class="notification-group">
    <h4 class="group-title">Channels</h4>
    <div class="setting-row">
        <div class="row-info">
            <span class="label">Email Notifications</span>
            <span class="description">Receive daily digests and activity summaries</span>
        </div>
        <div class="checkbox-container">
            <input type="checkbox" id="notify-email" checked>
            <label for="notify-email"></label>
        </div>
    </div>
    <div class="setting-row">
        <div class="row-info">
            <span class="label">Push Notifications</span>
            <span class="description">Real-time alerts in your browser</span>
        </div>
        <div class="checkbox-container">
            <input type="checkbox" id="notify-push">
            <label for="notify-push"></label>
        </div>
    </div>
</div>

<div class="notification-group">
    <h4 class="group-title">Activity</h4>
    <div class="setting-row">
        <div class="row-info">
            <span class="label">System Alerts</span>
            <span class="description">Critical updates and maintenance notices</span>
        </div>
        <div class="checkbox-container">
            <input type="checkbox" id="notify-system" checked>
            <label for="notify-system"></label>
        </div>
    </div>
    <div class="setting-row">
        <div class="row-info">
            <span class="label">Direct Messages</span>
            <span class="description">When someone sends you a message</span>
        </div>
        <div class="checkbox-container">
            <input type="checkbox" id="notify-messages" checked>
            <label for="notify-messages"></label>
        </div>
    </div>
</div>
