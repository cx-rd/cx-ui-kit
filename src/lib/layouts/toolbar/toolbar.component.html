<div class="toolbar-container">
    <div class="hamburger" (click)="onMenuClick()">
        <span class="material-icons">menu</span>
    </div>

    <div class="logo-area">
        <img src="assets/Logo_eng.svg" alt="Logo" class="logo desktop-logo">
        <img src="assets/Logo.svg" alt="Logo" class="logo mobile-logo">
    </div>

    <div class="spacer"></div>

    <div class="actions">
        <div class="icon-btn" cdkOverlayOrigin #notiTrigger="cdkOverlayOrigin" (click)="toggleNotifications()">
            <span class="material-icons">notifications_none</span>
            @if (notifications().length > 0) {
                <span class="badge"></span>
            }
        </div>
        <div class="profile-btn" cdkOverlayOrigin #userMenuTrigger="cdkOverlayOrigin" (click)="toggleUserMenu()">
            <span class="material-icons">account_circle</span>
        </div>
    </div>

    <ng-template
        cdkConnectedOverlay
        [cdkConnectedOverlayOrigin]="notiTrigger"
        [cdkConnectedOverlayOpen]="isNotificationOpen()"
        [cdkConnectedOverlayHasBackdrop]="true"
        cdkConnectedOverlayBackdropClass="cdk-overlay-transparent-backdrop"
        [cdkConnectedOverlayPanelClass]="'tp-ui-overlay-pane'"
        (backdropClick)="closeNotifications()"
        (detach)="closeNotifications()">
        <div class="notification-popover-wrapper">
            <lib-notification-popover
                [notifications]="notifications()"
                (markAllAsRead)="onMarkAllAsRead()"
                (viewDetail)="onViewNotificationDetail($event)"
                (hoverItem)="onNotificationHover($event)">
            </lib-notification-popover>

            @if (hoveredElement(); as hoveredOrigin) {
                <ng-template
                    cdkConnectedOverlay
                    [cdkConnectedOverlayOrigin]="hoveredOrigin"
                    [cdkConnectedOverlayOpen]="!!hoveredNotification()"
                    [cdkConnectedOverlayPositions]="previewPositions">
                    <lib-notification-preview [notification]="hoveredNotification()"></lib-notification-preview>
                </ng-template>
            }
        </div>
    </ng-template>

    <ng-template
        cdkConnectedOverlay
        [cdkConnectedOverlayOrigin]="userMenuTrigger"
        [cdkConnectedOverlayOpen]="isUserMenuOpen()"
        [cdkConnectedOverlayHasBackdrop]="true"
        cdkConnectedOverlayBackdropClass="cdk-overlay-transparent-backdrop"
        [cdkConnectedOverlayPanelClass]="'tp-ui-overlay-pane'"
        (backdropClick)="closeUserMenu()"
        (detach)="closeUserMenu()">
        <lib-user-menu
            [userInfo]="userInfo()"
            [customActions]="customActions()"
            (actionClick)="onUserMenuAction($event)">
        </lib-user-menu>
    </ng-template>

    @if (selectedNotification()) {
        <lib-notification-detail-modal
            [notification]="selectedNotification()"
            (close)="closeDetailModal()">
        </lib-notification-detail-modal>
    }
</div>
