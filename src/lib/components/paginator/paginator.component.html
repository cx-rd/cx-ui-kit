<nav class="paginator" [attr.aria-label]="ariaLabel()">
    @if (showBoundaryButtons()) {
        <button
            type="button"
            class="paginator__control paginator__control--boundary"
            [disabled]="!canGoPrevious"
            [attr.aria-label]="firstLabel()"
            (click)="goToFirst()">
            <span class="paginator__double-chevron paginator__double-chevron--left" aria-hidden="true"></span>
        </button>
    }

    <button
        type="button"
        class="paginator__control"
        [disabled]="!canGoPrevious"
        [attr.aria-label]="previousLabel()"
        (click)="goToPrevious()">
        <span class="paginator__chevron paginator__chevron--left" aria-hidden="true"></span>
    </button>

    <div class="paginator__pages" aria-live="polite">
        @for (item of pageItems; track item.type + '-' + (item.value ?? $index)) {
            @if (item.type === 'ellipsis') {
                <span class="paginator__ellipsis" aria-hidden="true">...</span>
            } @else {
                <button
                    type="button"
                    class="paginator__page"
                    [class.paginator__page--active]="item.value === resolvedPageIndex"
                    [attr.aria-current]="item.value === resolvedPageIndex ? 'page' : null"
                    (click)="goToPage(item.value!)">
                    {{ item.value! + 1 }}
                </button>
            }
        }
    </div>

    <button
        type="button"
        class="paginator__control"
        [disabled]="!canGoNext"
        [attr.aria-label]="nextLabel()"
        (click)="goToNext()">
        <span class="paginator__chevron paginator__chevron--right" aria-hidden="true"></span>
    </button>

    @if (showBoundaryButtons()) {
        <button
            type="button"
            class="paginator__control paginator__control--boundary"
            [disabled]="!canGoNext"
            [attr.aria-label]="lastLabel()"
            (click)="goToLast()">
            <span class="paginator__double-chevron paginator__double-chevron--right" aria-hidden="true"></span>
        </button>
    }
</nav>
