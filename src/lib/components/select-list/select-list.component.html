<div
    class="select-list"
    [class.select-list--open]="isPanelOpen"
    [class.select-list--invalid]="invalid"
    [class.select-list--disabled]="isDisabled">

    <label *ngIf="label" class="select-list__label" [attr.for]="triggerId">
        {{ label }}
        <span *ngIf="required" class="select-list__required" aria-hidden="true">*</span>
    </label>

    <div class="select-list__control" cdkOverlayOrigin #overlayOrigin="cdkOverlayOrigin">
        <button
            #triggerButton
            [id]="triggerId"
            type="button"
            class="select-list__trigger"
            [disabled]="isDisabled"
            [attr.aria-controls]="panelId"
            [attr.aria-expanded]="isPanelOpen"
            [attr.aria-haspopup]="'listbox'"
            [attr.aria-invalid]="invalid"
            [attr.aria-label]="trackSelectedSummary"
            (click)="togglePanel()">

            <span class="select-list__value" [class.select-list__value--placeholder]="!hasSelection">
                <span *ngIf="!hasSelection">{{ placeholder }}</span>

                <ng-container *ngIf="hasSelection && isMulti">
                    <span class="select-list__chip" *ngFor="let option of visibleSelectedOptions; trackBy: trackByOption">
                        {{ option.label }}
                    </span>

                    <span class="select-list__summary" *ngIf="hiddenSelectionCount > 0">
                        +{{ hiddenSelectionCount }}
                    </span>
                </ng-container>

                <ng-container *ngIf="hasSelection && !isMulti && selectedOption">
                    <span class="select-list__single-label">{{ selectedOption.label }}</span>
                    <span class="select-list__single-caption" *ngIf="selectedOption.caption">
                        {{ selectedOption.caption }}
                    </span>
                </ng-container>
            </span>
        </button>

        <button
            *ngIf="showClearButton"
            type="button"
            class="select-list__clear"
            aria-label="Clear selection"
            (click)="clearSelection($event)">
            <span></span>
            <span></span>
        </button>

        <span class="select-list__chevron" aria-hidden="true"></span>
    </div>

    <p *ngIf="hint" class="select-list__hint">{{ hint }}</p>
</div>

<ng-template
    cdkConnectedOverlay
    [cdkConnectedOverlayOrigin]="overlayOrigin"
    [cdkConnectedOverlayOpen]="isPanelOpen"
    [cdkConnectedOverlayHasBackdrop]="true"
    [cdkConnectedOverlayBackdropClass]="'cdk-overlay-transparent-backdrop'"
    [cdkConnectedOverlayPositions]="overlayPositions"
    [cdkConnectedOverlayWidth]="overlayWidth"
    (backdropClick)="closePanel()"
    (detach)="onOverlayDetach()">

    <section
        class="select-list__panel"
        [id]="panelId"
        (keydown.escape)="closePanel()">
        <div class="select-list__toolbar" *ngIf="canShowSearch || (isMulti && showSelectAll)">
            <label
                *ngIf="isMulti && showSelectAll && selectableVisibleOptions.length"
                class="select-list__bulk-toggle"
                aria-label="Toggle visible options">
                <input
                    type="checkbox"
                    [checked]="allVisibleOptionsSelected"
                    (change)="toggleSelectAll()" />
                <span class="select-list__checkbox select-list__checkbox--toolbar">
                    <span></span>
                </span>
            </label>

            <label class="select-list__search" *ngIf="canShowSearch">
                <span class="select-list__search-icon" aria-hidden="true"></span>
                <input
                    #searchInput
                    type="text"
                    [formControl]="searchControl"
                    [placeholder]="searchPlaceholder"
                    [attr.aria-label]="searchPlaceholder" />
            </label>
        </div>

        <div class="select-list__status" *ngIf="loading">{{ loadingLabel }}</div>
        <div class="select-list__status select-list__status--error" *ngIf="!loading && errorMessage">
            {{ errorMessage }}
        </div>
        <div class="select-list__status" *ngIf="shouldShowMinQueryHint">
            {{ resolvedMinQueryLabel }}
        </div>

        <div
            class="select-list__list"
            role="listbox"
            [attr.aria-multiselectable]="isMulti"
            *ngIf="!errorMessage && !shouldShowMinQueryHint">

            <ng-container *ngIf="optionGroups.length; else emptyState">
                <div class="select-list__group" *ngFor="let group of optionGroups; trackBy: trackByGroup">
                    <p *ngIf="group.label" class="select-list__group-label">{{ group.label }}</p>

                    <button
                        *ngFor="let option of group.options; trackBy: trackByOption"
                        type="button"
                        role="option"
                        class="select-list__option"
                        [class.select-list__option--selected]="isSelected(option)"
                        [class.select-list__option--locked]="isOptionLocked(option)"
                        [disabled]="option.disabled || isOptionLocked(option)"
                        [attr.aria-selected]="isSelected(option)"
                        (click)="selectOption(option)">

                        <span class="select-list__checkbox" *ngIf="isMulti" [class.select-list__checkbox--checked]="isSelected(option)">
                            <span></span>
                        </span>

                        <span class="select-list__option-copy">
                            <span class="select-list__option-label">{{ option.label }}</span>
                            <span class="select-list__option-caption" *ngIf="option.caption">{{ option.caption }}</span>
                        </span>

                        <span class="select-list__option-state" *ngIf="!isMulti && isSelected(option)">Selected</span>
                    </button>
                </div>
            </ng-container>

            <ng-template #emptyState>
                <div class="select-list__status" *ngIf="!loading">{{ emptyLabel }}</div>
            </ng-template>
        </div>

        <button *ngIf="canLoadMore" type="button" class="select-list__load-more" (click)="loadMore()">
            Load more
        </button>
    </section>
</ng-template>
