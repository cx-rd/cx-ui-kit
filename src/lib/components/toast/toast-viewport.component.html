@for (group of groups(); track group[0]) {
    <section
        class="toast-stack"
        [class]="positionClasses[group[0]]"
        [attr.data-position]="group[0]"
        [class.toast-stack--expanded]="isExpanded(group[0])"
        (focusin)="setExpanded(group[0], true)"
        (focusout)="onStackFocusOut(group[0], $event)">
        @for (toast of getStackedToasts(group[1]); track toast.id; let index = $index) {
            <div
                class="toast-stack__item"
                [style.--stack-index]="index"
                [style.--stack-z]="20 - index">
                <lib-toast
                    [toast]="toast"
                    (dismiss)="dismiss($event)"
                    (hoverChange)="onToastHover(group[0], $event)"
                    (actionClick)="onAction($event)">
                </lib-toast>
            </div>
        }
    </section>
}
