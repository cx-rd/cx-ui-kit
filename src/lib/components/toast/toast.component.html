<article
    class="toast"
    [class]="toastClassName()"
    [class.toast--loading]="toast().variant === 'loading'"
    [ngStyle]="hostStyles()"
    (mouseenter)="onHover(true)"
    (mouseleave)="onHover(false)">

    @if (toast().showIcon) {
        <div class="toast__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false">
                <path [attr.d]="iconSvg()"></path>
            </svg>
        </div>
    }

    <div class="toast__body">
        @if (toast().label) {
            <p class="toast__label">{{ toast().label }}</p>
        }
        <h4 class="toast__title">{{ toast().title }}</h4>
        @if (toast().message) {
            <p class="toast__message">{{ toast().message }}</p>
        }

        @if (toast().action; as action) {
            <button
                type="button"
                class="toast__action"
                [class.toast__action--ghost]="action.appearance !== 'solid'"
                (click)="onAction(action)">
                {{ action.label }}
            </button>
        }
    </div>

    @if (toast().closable) {
        <button type="button" class="toast__close" aria-label="Dismiss toast" (click)="onDismiss()">
            <span></span>
            <span></span>
        </button>
    }
</article>
